hugoblox:
  schema: "2.0"

  identity:
    name: "Dimitrios Dagdilelis"
    organization: ""
    type: person
    tagline: "ML/AI Engineer"
    description: "ML Engineer, specializing in multimodal AI, computer vision, and sensor fusion."
    social:
      twitter: ""

  theme:
    mode: system
    pack: "default"
    colors:
      primary: "#1565c0"
      neutral: "slate"
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  typography:
    font: "sans"
    size: "sm"

  layout:
    radius: ""
    spacing: "comfortable"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: left
    search: false
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    style: minimal
    language_switcher: false
    text: ""

  copyright:
    notice: "© {year} {name}"
    license:
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  seo:
    title: "Dimitrios Dagdilelis personal website"
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: 56.2639
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: ""
      contact: ""

  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: apa

  search:
    enable: false
    suggestions: []
    quick_actions: []

  comments:
    enable: false
    provider: ""
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  analytics:
    google:
      measurement_id: "G-S553SQRQSL"
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  repository:
    enable: false
    url: "https://github.com/dimidagd/dimidagd.github.io"
    branch: main
    content_dir: content

  locale:
    date_format: "2 Jan, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""

  privacy:
    enable: false
    anonymize_analytics: true

  debug:
    enable: false
    hud:
      position: bottom-left
      opacity: 1.0
    export_logs: true

  pro:
    hide_attribution: false
