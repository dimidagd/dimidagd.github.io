name: Build

env:
  NODE_VERSION: '22'

on:
  pull_request:
    branches: ['main']
  workflow_call:
    outputs:
      artifact-id:
        description: 'The ID of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-id }}
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: hashFiles('package.json') != ''
        uses: pnpm/action-setup@v4

      - name: Get Hugo Version
        run: |
          python3 - <<'PY'
          import yaml
          from pathlib import Path
          data = yaml.safe_load(Path("hugoblox.yaml").read_text())
          version = data.get("build", {}).get("hugo_version", "0.156.0")
          print(f"HUGO_VERSION={version}")
          Path("/tmp/hugo_version_env").write_text(f"HUGO_VERSION={version}\n")
          PY
          cat /tmp/hugo_version_env >> "$GITHUB_ENV"

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: |
          pnpm install --no-frozen-lockfile || npm install

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - uses: actions/cache@v4
        with:
          path: |
            /tmp/hugo_cache_runner/
            node_modules/
            modules/*/node_modules/
          key: ${{ runner.os }}-hugo-deps-${{ hashFiles('**/go.mod', '**/package-lock.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-deps-

      - uses: actions/cache@v4
        with:
          path: resources/
          key: ${{ runner.os }}-hugo-resources-${{ hashFiles('assets/**/*', 'config/**/*', 'hugoblox.yaml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_BLOX_LICENSE: ${{ secrets.HUGO_BLOX_LICENSE }}
        run: |
          hugo --minify

      - name: Generate Pagefind search index
        if: hashFiles('package.json') != ''
        run: |
          pnpm run pagefind || npx pagefind --site "public"

      - name: Upload artifact
        id: upload
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public
