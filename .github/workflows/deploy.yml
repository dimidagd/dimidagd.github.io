name: Deploy website to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  config:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    outputs:
      deploy-host: ${{ steps.check.outputs.host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: hugoblox.yaml
          sparse-checkout-cone-mode: false

      - name: Check deploy host
        id: check
        run: |
          python3 - <<'PY'
          import yaml
          from pathlib import Path
          data = yaml.safe_load(Path("hugoblox.yaml").read_text())
          host = data.get("deploy", {}).get("host", "github-pages")
          if host not in {"github-pages", "netlify", "vercel", "cloudflare", "none"}:
              host = "github-pages"
          Path("/tmp/deploy_host").write_text(host)
          PY
          echo "host=$(cat /tmp/deploy_host)" >> "$GITHUB_OUTPUT"

  build:
    needs: config
    if: github.repository_owner != 'HugoBlox'
    uses: ./.github/workflows/build.yml
    secrets: inherit

  deploy:
    needs: [config, build]
    if: needs.config.outputs.deploy-host == 'github-pages'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
